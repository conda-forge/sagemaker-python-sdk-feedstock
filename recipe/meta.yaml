{% set name = "sagemaker-python-sdk" %}
{% set version = "3.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/sagemaker/sagemaker-{{ version }}.tar.gz
  sha256: 7c4d8c66a495dd1183f353de86431d0870cbcf45e19287f48a09ea6f2affca2d

build:
  noarch: python
  number: 0

requirements:
  run:
    - python >=3.9
    - sagemaker-core >=2.6.0,<3.0.0
    - sagemaker-train >=1.6.0,<2.0.0
    - sagemaker-serve >=1.6.0,<2.0.0
    - sagemaker-mlops >=1.6.0,<2.0.0

test:
  imports:
    - sagemaker
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/aws/sagemaker-python-sdk/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Open source library for training and deploying models on Amazon SageMaker.
  doc_url: https://sagemaker.readthedocs.io/en/stable/
  dev_url: https://github.com/aws/sagemaker-python-sdk/

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - claytonparnell
    - nargokul
