{% set name = "sagemaker-python-sdk" %}
{% set version = "3.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/sagemaker/sagemaker-{{ version }}.tar.gz
  sha256: 0ef78944392d7aa7c1a339372f57e18bb50a873b57c619c11e35d67d198de65f

build:
  noarch: python
  number: 0

requirements:
  run:
    - python >=3.9
    - sagemaker-core >=2.12.0,<3.0.0
    - sagemaker-train >=1.12.0,<2.0.0
    - sagemaker-serve >=1.12.0,<2.0.0
    - sagemaker-mlops >=1.12.0,<2.0.0

test:
  imports:
    - sagemaker
    - sagemaker.core
    - sagemaker.train
    - sagemaker.serve
    - sagemaker.mlops

about:
  home: https://github.com/aws/sagemaker-python-sdk/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Open source library for training and deploying models on Amazon SageMaker.
  doc_url: https://sagemaker.readthedocs.io/en/stable/
  dev_url: https://github.com/aws/sagemaker-python-sdk/

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - nargokul
    - aviruthen

