{% set name = "sagemaker-python-sdk" %}
{% set version = "3.10.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/sagemaker/sagemaker-{{ version }}.tar.gz
  sha256: 566a0f4c5bb3a38f3b2c200823ea1abe901aeab5c9e3cc5828a6cf7fa8fd6862

build:
  noarch: python
  number: 0

requirements:
  run:
    - python >=3.9
    - sagemaker-core >=2.10.1,<3.0.0
    - sagemaker-train >=1.10.1,<2.0.0
    - sagemaker-serve >=1.10.1,<2.0.0
    - sagemaker-mlops >=1.10.1,<2.0.0

test:
  imports:
    - sagemaker
    - sagemaker.core
    - sagemaker.train
    - sagemaker.serve
    - sagemaker.mlops

about:
  home: https://github.com/aws/sagemaker-python-sdk/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Open source library for training and deploying models on Amazon SageMaker.
  doc_url: https://sagemaker.readthedocs.io/en/stable/
  dev_url: https://github.com/aws/sagemaker-python-sdk/

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - claytonparnell
    - nargokul
