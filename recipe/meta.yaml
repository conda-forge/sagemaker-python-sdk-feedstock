{% set name = "sagemaker-python-sdk" %}
{% set version = "3.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/sagemaker/sagemaker-{{ version }}.tar.gz
  sha256: 7be7c3f0f36a118ffa273a3ae42d19a91539816b6cf0aa6bd7c16d74a5c7df60

build:
  noarch: python
  number: 0

requirements:
  run:
    - python >=3.9
    - sagemaker-core >=2.14.0,<3.0.0
    - sagemaker-train >=1.14.0,<2.0.0
    - sagemaker-serve >=1.14.0,<2.0.0
    - sagemaker-mlops >=1.14.0,<2.0.0

test:
  imports:
    - sagemaker
    - sagemaker.core
    - sagemaker.train
    - sagemaker.serve
    - sagemaker.mlops

about:
  home: https://github.com/aws/sagemaker-python-sdk/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Open source library for training and deploying models on Amazon SageMaker.
  doc_url: https://sagemaker.readthedocs.io/en/stable/
  dev_url: https://github.com/aws/sagemaker-python-sdk/

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - nargokul
    - aviruthen

